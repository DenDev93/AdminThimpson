
<h2 class="sr-only">Hoja de ruta completa del ecosistema Servicio Express Thimpson: 6 fases con notificaciones en tiempo real, agentes IA y 4 plataformas.</h2>
<div id="rm" style="padding:0.25rem 0 1rem;"></div>
<script>
const phases = [
  { n:'1', name:'Base de datos', status:'done',
    stack:'Supabase PostgreSQL · PostGIS · Realtime · pgcrypto',
    detail:'16 tablas · RLS en todas · Realtime activo · Super admin · Búsqueda española · Triggers',
    modules:[] },
  { n:'2', name:'API Serverless', status:'current',
    stack:'Next.js 15 App Router · TypeScript · Zod · Vercel Functions',
    detail:'9 módulos independientes · JWT middleware · Supabase server-side · notificaciones automáticas',
    modules:['auth','solicitudes','motorizados','notificaciones','ganancias','negocios','cms','chat-ia','whatsapp'],
    cta:'Construir estructura base Next.js 15 + módulo auth de la API Thimpson' },
  { n:'3', name:'Panel AdminThimpson', status:'pending',
    stack:'React 18 · Vite · TailwindCSS · #FBB03B · #0B1F22',
    detail:'Login · Dashboard RT · Gestión solicitudes · Motorizados · Marketplace · CMS · Ganancias · Agente IA',
    modules:['login admin','dashboard RT','solicitudes','motorizados','negocios','cms','ganancias','agente IA'] },
  { n:'4', name:'Web pública (appwebThimpson)', status:'pending',
    stack:'React 18 · Vite · TailwindCSS · foto dueño en hero',
    detail:'Landing · Solicitar servicio · Tracking en vivo · Marketplace · Chatbot IA · Botón WhatsApp',
    modules:['landing + hero','solicitar servicio','tracking RT','marketplace','chatbot IA','WhatsApp'] },
  { n:'5A', name:'App clientes (Expo Go ▶ QR)', status:'pending',
    stack:'React Native · Expo SDK 51 · Expo Go · #FFD500 · blanco',
    detail:'Login · Pedir servicio · Tracking GPS · Marketplace · Chat IA · Notificaciones + sonidos',
    modules:['login / registro','home servicios','pedir servicio','tracking GPS RT','marketplace','chat IA','notif + sonidos'] },
  { n:'5B', name:'App motorizados (Expo Go ▶ QR)', status:'pending',
    stack:'React Native · Expo SDK 51 · Expo Go · imagen de referencia en archivos_base',
    detail:'Login · Pedidos cercanos 3.5km · Aceptar/rechazar · GPS update · Entregar · Ganancias',
    modules:['login','pedidos cercanos','aceptar / rechazar','GPS update','estado entrega','ganancias','notif + sonidos'] },
];

const cross = [
  { icon:'ti-bolt', t:'Realtime en las 4 plataformas', s:'Supabase WebSockets · dato cambia → todos lo ven al instante' },
  { icon:'ti-bell', t:'12 notificaciones con sonido', s:'sonido único por evento · badge counter · historial' },
  { icon:'ti-robot', t:'3 Agentes IA — Claude API', s:'Admin 24/7 · Chatbot web · Bot WhatsApp' },
  { icon:'ti-brand-whatsapp', t:'WhatsApp Business Cloud', s:'Webhook Meta · respuestas automáticas en tiempo real' },
];

const el = document.getElementById('rm');

el.innerHTML += `
<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
  <div style="flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;">
    <div style="width:16%;height:100%;background:#1D9E75;border-radius:3px;"></div>
  </div>
  <span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;font-weight:500;">DB LISTA · FASE 1 DE 6</span>
</div>`;

phases.forEach((p,i) => {
  const done = p.status==='done', cur = p.status==='current';
  const leftBorder = done ? 'border-left:3px solid #1D9E75;border-radius:0 12px 12px 0;border-top:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);'
    : cur ? 'border:2px solid var(--color-border-info);border-radius:12px;'
    : 'border:0.5px solid var(--color-border-tertiary);border-radius:12px;';
  const badgeStyle = done ? 'background:var(--color-background-success);color:var(--color-text-success);'
    : cur ? 'background:var(--color-background-info);color:var(--color-text-info);'
    : 'background:var(--color-background-secondary);color:var(--color-text-secondary);';
  const badgeText = done ? '✓ COMPLETADA' : cur ? 'CONSTRUIR AHORA' : 'PENDIENTE';

  let mods = '';
  if (p.modules.length) {
    mods = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px;">
      ${p.modules.map(m => {
        const click = cur ? `onclick="sendPrompt('Construye el módulo ${m} de la API Thimpson con todos los endpoints necesarios para el ecosistema.')"` : '';
        const iconClass = done ? 'ti-circle-check' : cur ? 'ti-circle-dashed' : 'ti-circle';
        const iconColor = done ? '#1D9E75' : cur ? 'var(--color-text-info)' : 'var(--color-text-tertiary)';
        return `<div ${click} style="background:var(--color-background-secondary);border-radius:8px;padding:6px 8px;font-size:11px;display:flex;align-items:center;gap:5px;${cur?'cursor:pointer;':''}">
          <i class="ti ${iconClass}" style="font-size:13px;color:${iconColor};flex-shrink:0;" aria-hidden="true"></i>${m}</div>`;
      }).join('')}
    </div>`;
  }

  const cta = (cur && p.cta) ? `<button onclick="sendPrompt('${p.cta}')"
    style="margin-top:12px;width:100%;padding:10px;background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;">
    Empezar a construir ahora ↗</button>` : '';

  el.innerHTML += `
  <div style="${leftBorder}background:var(--color-background-primary);padding:12px 14px;margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
      <span style="font-size:13px;font-weight:500;">Fase ${p.n} — ${p.name}</span>
      <span style="font-size:10px;font-weight:500;${badgeStyle}padding:2px 10px;border-radius:20px;">${badgeText}</span>
    </div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">${p.stack}</div>
    <div style="font-size:11px;color:var(--color-text-tertiary);">${p.detail}</div>
    ${mods}${cta}
  </div>`;
});

el.innerHTML += `
<div style="background:var(--color-background-secondary);border-radius:12px;padding:14px;margin-top:4px;">
  <div style="font-size:10px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.06em;margin-bottom:10px;">TRANSVERSAL — ACTIVO DESDE EL INICIO EN LAS 4 PLATAFORMAS</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
    ${cross.map(c=>`
    <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:10px;display:flex;gap:8px;align-items:flex-start;">
      <i class="ti ${c.icon}" style="font-size:20px;color:var(--color-text-info);flex-shrink:0;" aria-hidden="true"></i>
      <div><div style="font-size:12px;font-weight:500;margin-bottom:2px;">${c.t}</div>
      <div style="font-size:11px;color:var(--color-text-secondary);">${c.s}</div></div>
    </div>`).join('')}
  </div>
</div>`;
</script>
